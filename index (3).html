<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <button>Home</button>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f7f51c;
            padding: 20px;
        }

        .container{
            width: 70%;
            max-height: 900px;
            margin: auto;
            border: 1px solid red;

        }

        .box{
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: blueviolet;
            background-image: url(55.jpg);

        }

        .header{
            height: 80px;
            display: flex;
            gap: 5px;
            padding-bottom: 10px;
        
        }

        .nav{
            height: 80px;
            display: flex;
            gap: 5px;
            padding-bottom: 10px;

        }

        .middle{
            display: flex;
            gap: 5px;
            padding-bottom: 10px;

        }

        .left{
            width: 70%;
            display: flex;
            flex-direction: column;
            gap: 10px;

        }

        section{
            height: 200px;


        }

        article{
            height: 150px;


        }

        aside{
            width: 35%;
        }
        footer{
            height: 80px;
        }



 </style>


</head>
<body>


    <div class="container">
        <heade class="box">
            Header 
            
        </heade>

        <nav class="box">
            Navbar 
            </nav>

            <div class="middle">
                <div class="left">
                    <section class="box">
                        Section 
                        </section>

                        <article class="box">
                            Article 
                            </article>
                        </div>
                    <aside class="box">
                        Aside 
                        </aside>
                        </div>
                    <footer class="box">
                        Footer 
                        </footer>

        </div>


   







    
</body>
</html>
